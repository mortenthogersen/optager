services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: "${BUILD_DATE:-0}"
    image: optager:latest
    container_name: optager
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - app-data:/var/www/html/database
      - recordings-data:/var/www/html/storage/app/recordings
    environment:
      APP_NAME: "${APP_NAME:-Modeoptager}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Europe/Copenhagen}"
      APP_URL: "${APP_URL:-http://localhost}"
      ASSET_URL: "${APP_URL:-http://localhost}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: local
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-v4-flash}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
      TRANSCRIPTION_RUNNER: openrouter
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      OPENROUTER_STT_MODEL: "${OPENROUTER_STT_MODEL:-nvidia/parakeet-tdt-0.6b-v3}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
  recordings-data:
